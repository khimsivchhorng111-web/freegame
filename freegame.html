<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Gaming Arcade</title>
    <style>
        /* --- Gaming Dark Theme Design --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d1117;
            color: #ffffff;
        }

        /* Navigation Bar */
        header {
            background-color: #161b22;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #00f0ff;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
        }

        header h1 {
            font-size: 24px;
            color: #00f0ff;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
        }

        /* Main Layout */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Game Screen Area (Professional Iframe Player) */
        .game-player-section {
            background-color: #161b22;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 40px;
            border: 1px solid #30363d;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        .game-title {
            font-size: 22px;
            margin-bottom: 15px;
            color: #ff007f;
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.3);
        }

        .video-container {
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
            border: 2px solid #30363d;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* Game Grid Section */
        .section-title {
            font-size: 20px;
            margin-bottom: 20px;
            border-left: 4px solid #00f0ff;
            padding-left: 10px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }

        /* Game Card Styling */
        .game-card {
            background-color: #161b22;
            border-radius: 10px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease;
            border: 1px solid #30363d;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00f0ff;
            box-shadow: 0 5px 15px rgba(0, 240, 255, 0.2);
        }

        .game-thumbnail {
            width: 100%;
            height: 140px;
            background-size: cover;
            background-position: center;
            background-color: #21262d;
        }

        .game-info {
            padding: 15px;
        }

        .game-name {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .game-genre {
            font-size: 12px;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <header>
        <h1>🎮 KHMER ARCADE</h1>
        <div style="color: #8b949e;">Free HTML5 Games</div>
    </header>

    <div class="container">
        
        <section class="game-player-section">
            <h2 class="game-title" id="current-title">Select a game below to play!</h2>
            <div class="video-container">
                <iframe id="game-frame" src="" frameborder="0" allowfullscreen></iframe>
            </div>
        </section>
